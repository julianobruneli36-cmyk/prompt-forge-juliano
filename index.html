<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROMPT FORGE JULIANO PRO</title>
    <style>
        :root {
            --primary: #ffd700;
            --secondary: #1a1a1a;
            --accent: #ff4500;
            --text: #ffffff;
        }
        body {
            background: linear-gradient(135deg, #0f0f0f 0%, #252525 100%);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: rgba(0, 0, 0, 0.8);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.1);
            border: 1px solid rgba(255, 215, 0, 0.2);
        }
        h1 {
            text-align: center;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        label {
            font-weight: bold;
            color: var(--primary);
            font-size: 0.9em;
        }
        input, select {
            background: #333;
            border: 1px solid #444;
            color: white;
            padding: 12px;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input:focus {
            outline: none;
            border-color: var(--primary);
        }
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(to right, #ffd700, #ff8c00);
            border: none;
            border-radius: 10px;
            color: #000;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            text-transform: uppercase;
            transition: transform 0.2s, box-shadow 0.2s;
            margin: 20px 0;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.4);
        }
        .results {
            background: #111;
            padding: 20px;
            border-radius: 12px;
            border-left: 5px solid var(--primary);
            display: none;
            animation: fadeIn 0.5s;
        }
        .result-item {
            margin-bottom: 25px;
            position: relative;
        }
        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .copy-btn {
            background: #333;
            color: var(--primary);
            padding: 5px 15px;
            border-radius: 5px;
            font-size: 12px;
            width: auto;
            margin: 0;
        }
        pre {
            background: #000;
            padding: 15px;
            border-radius: 8px;
            white-space: pre-wrap;
            word-wrap: break-word;
            font-size: 14px;
            line-height: 1.6;
            border: 1px solid #222;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Prompt Forge Juliano Pro</h1>
        
        <div class="grid">
            <div class="input-group">
                <label>Tema do Vídeo:</label>
                <input type="text" id="tema" placeholder="Ex: O segredo de Elias">
            </div>
            <div class="input-group">
                <label>Nicho do Canal:</label>
                <select id="nicho">
                    <option value="biblico">Bíblico (Narrativa/Mistério)</option>
                    <option value="luxo">Luxo & Timelapse</option>
                    <option value="viral">Viral (8 Segundos/Impacto)</option>
                </select>
            </div>
            <div class="input-group">
                <label>Quantidade de Cenas:</label>
                <input type="number" id="cenas" value="10" min="1" max="50">
            </div>
            <div class="input-group">
                <label>Duração (segundos):</label>
                <input type="number" id="duracao" value="60" min="5" max="600">
            </div>
        </div>

        <button onclick="gerar()">Gerar Estrutura Profissional</button>

        <div id="results" class="results">
            <div class="result-item">
                <div class="result-header">
                    <label>Título Viral:</label>
                    <button class="copy-btn" onclick="copy('titulo-text')">Copiar</button>
                </div>
                <pre id="titulo-text"></pre>
            </div>

            <div class="result-item">
                <div class="result-header">
                    <label>Narração Completa (Script):</label>
                    <button class="copy-btn" onclick="copy('script-text')">Copiar</button>
                </div>
                <pre id="script-text"></pre>
            </div>

            <div class="result-item">
                <div class="result-header">
                    <label>Prompts Sincronizados (VO3):</label>
                    <button class="copy-btn" onclick="copy('prompts-text')">Copiar</button>
                </div>
                <pre id="prompts-text"></pre>
            </div>
        </div>
    </div>

    <script>
        const bases = {
            biblico: {
                titulos: ["O SEGREDO QUE A BÍBLIA ESCONDEU: [TEMA]", "A VERDADE SOBRE [TEMA] VAI TE CHOCAR", "POR QUE NINGUÉM FALA DISSO? [TEMA]"],
                hook: "Você sabia que a Bíblia revela algo oculto sobre [TEMA]? Preste muita atenção.",
                corpo: "Diz a história que [TEMA] não foi apenas um evento, mas um sinal. Muitos ignoram os detalhes, mas os antigos sabiam que...",
                final: "Se você acredita que Deus tem um plano, curta e siga para mais mistérios bíblicos.",
                estilo_prompt: "Cinematic, epic biblical atmosphere, golden hour, 8k, detailed textures, hyper-realistic, religious mystery style."
            },
            luxo: {
                titulos: ["A MANSÃO DE [TEMA] É SURREAL", "COMO VIVEM OS BILIONÁRIOS EM [TEMA]", "TRANSFORMAÇÃO ÉPICA: [TEMA]"],
                hook: "Bem-vindo ao ápice do luxo. Hoje vamos explorar [TEMA].",
                corpo: "Cada detalhe aqui foi projetado para a perfeição. O design de [TEMA] redefine o que conhecemos por exclusividade.",
                final: "Qual dessas áreas você mais gostou? Comente abaixo.",
                estilo_prompt: "Luxury real estate photography, architectural masterpiece, drone shot, clean lines, expensive materials, sunset lighting, high-end finish."
            },
            viral: {
                titulos: ["ISSO É IMPOSSÍVEL!", "VOCÊ JÁ VIU ISSO?", "O FINAL É INACREDITÁVEL"],
                hook: "Olha o que acontece quando [TEMA]...",
                corpo: "[TEMA] em 8 segundos de pura adrenalina. Veja o movimento.",
                final: "Compartilhe com um amigo!",
                estilo_prompt: "Fast motion, vibrant colors, trending viral video style, high contrast, dynamic movement, 4k."
            }
        };

        function gerar() {
            const tema = document.getElementById('tema').value || 'Exploração';
            const nicho = document.getElementById('nicho').value;
            const numCenas = parseInt(document.getElementById('cenas').value);
            const duracao = parseInt(document.getElementById('duracao').value);
            
            const base = bases[nicho];
            
            // Título
            const titulo = base.titulos[Math.floor(Math.random() * base.titulos.length)].replace('[TEMA]', tema);
            document.getElementById('titulo-text').innerText = titulo;

            // Script
            let script = `${base.hook.replace('[TEMA]', tema)}

`;
            script += `${base.corpo.replace('[TEMA]', tema)}

`;
            script += base.final;
            document.getElementById('script-text').innerText = script;

            // Prompts VO3
            let prompts = "";
            const tempoPorCena = (duracao / numCenas).toFixed(1);
            
            for(let i = 1; i <= numCenas; i++) {
                const startTime = ((i-1) * tempoPorCena).toFixed(1);
                const endTime = (i * tempoPorCena).toFixed(1);
                prompts += `[${startTime}-${endTime}s] ${tema} scene ${i}: ${base.estilo_prompt}
`;
            }
            document.getElementById('prompts-text').innerText = prompts;

            document.getElementById('results').style.display = 'block';
        }

        function copy(id) {
            const text = document.getElementById(id).innerText;
            navigator.clipboard.writeText(text).then(() => {
                alert('Copiado com sucesso!');
            });
        }
    </script>
</body>
</html>
