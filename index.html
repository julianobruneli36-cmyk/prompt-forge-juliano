<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROMPT FORGE JULIANO PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ffd700;
            --bg: #000000;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 215, 0, 0.3);
            --text: #ffffff;
            --accent: #ffcc00;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            padding: 20px;
            background-image: radial-gradient(circle at 50% 50%, #111 0%, #000 100%);
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        header {
            text-align: center;
            margin-bottom: 50px;
        }
        h1 {
            font-size: 3rem;
            font-weight: 900;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 8px;
            margin-bottom: 5px;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
        }
        .subtitle {
            color: #888;
            font-size: 0.9rem;
            letter-spacing: 3px;
            text-transform: uppercase;
        }
        .niche-selector {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }
        .niche-btn {
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-weight: 700;
            opacity: 0.7;
        }
        .niche-btn:hover {
            border-color: var(--primary);
            transform: translateY(-5px);
            opacity: 1;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        .niche-btn.active {
            background: var(--primary);
            color: black;
            opacity: 1;
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
        }
        .input-card {
            background: rgba(20, 20, 20, 0.8);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 25px;
            border: 1px solid #333;
            margin-bottom: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
        }
        .row {
            display: grid;
            grid-template-columns: 3fr 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }
        .field { display: flex; flex-direction: column; gap: 10px; }
        label { font-size: 0.75rem; color: var(--primary); font-weight: 900; text-transform: uppercase; letter-spacing: 1px; }
        input, textarea {
            background: #000;
            border: 1px solid #444;
            padding: 18px;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            width: 100%;
            transition: 0.3s;
        }
        input:focus, textarea:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.1);
        }
        textarea { height: 100px; resize: none; }
        .btn-main {
            width: 100%;
            padding: 25px;
            background: linear-gradient(45deg, var(--primary), var(--accent));
            border: none;
            border-radius: 15px;
            font-weight: 900;
            font-size: 1.3rem;
            cursor: pointer;
            text-transform: uppercase;
            color: black;
            transition: 0.4s;
            margin-top: 10px;
        }
        .btn-main:hover {
            transform: scale(1.02);
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.4);
        }
        .loader {
            display: none;
            text-align: center;
            padding: 60px;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255,215,0,0.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .results { display: none; margin-top: 50px; }
        .card {
            background: #0a0a0a;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            border-left: 6px solid var(--primary);
            position: relative;
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .copy-badge {
            background: var(--primary);
            color: black;
            padding: 6px 18px;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 900;
            cursor: pointer;
            transition: 0.3s;
        }
        .copy-badge:hover { transform: scale(1.1); }
        pre {
            white-space: pre-wrap;
            font-size: 1rem;
            line-height: 1.8;
            color: #ddd;
        }
        .notif {
            position: fixed;
            top: 30px;
            right: 30px;
            background: var(--primary);
            color: black;
            padding: 20px 40px;
            border-radius: 15px;
            font-weight: 900;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: none;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div class="notif" id="notif">COPIADO COM SUCESSO!</div>
    <div class="container">
        <header>
            <h1>Prompt Forge Juliano</h1>
            <p class="subtitle">Personal Pro Edition - YouTube Bible & Luxury</p>
        </header>

        <div class="niche-selector">
            <div class="niche-btn active" onclick="setNiche('Bíblico', this)">📜 BÍBLICO</div>
            <div class="niche-btn" onclick="setNiche('Luxo Real Estate', this)">💎 LUXO RE</div>
            <div class="niche-btn" onclick="setNiche('Curiosidades Virais', this)">🔥 VIRAL 8s</div>
        </div>

        <div class="input-card">
            <div class="row">
                <div class="field">
                    <label>Tema da Narrativa</label>
                    <input type="text" id="tema" placeholder="Ex: A queda de Jericó / Mansão em Dubai">
                </div>
                <div class="field">
                    <label>Cenas</label>
                    <input type="number" id="cenas" value="8">
                </div>
                <div class="field">
                    <label>Segundos</label>
                    <input type="number" id="duracao" value="50">
                </div>
            </div>
            <div class="field" style="margin-bottom: 20px;">
                <label>Foco Principal / Detalhes</label>
                <textarea id="detalhes" placeholder="Ex: Enfatize a emoção dos personagens e a escala épica da construção..."></textarea>
            </div>
            <div class="field" style="opacity: 0.5; font-size: 0.6rem;">
                <label>Gemini API Configured</label>
                <input type="password" id="apiKey" value="AQ.Ab8RN6KOHlzwFf_-Kr-MU2wotsJViyUJDWsgxvDLqL0cqMdclQ">
            </div>
            <button class="btn-main" onclick="forjar()">FORJAR ROTEIRO PROFISSIONAL</button>
        </div>

        <div class="loader" id="loader">
            <div class="spinner"></div>
            <p style="color: var(--primary); font-weight: 900; letter-spacing: 2px;">IA PROCESSANDO ENGENHARIA DE PROMPTS...</p>
        </div>

        <div class="results" id="results">
            <div class="card">
                <div class="card-header">
                    <label>Título Magnético</label>
                    <div class="copy-badge" onclick="copy('titulo')">COPIAR</div>
                </div>
                <h2 id="titulo" style="color: var(--primary); font-size: 1.5rem;"></h2>
            </div>

            <div class="card">
                <div class="card-header">
                    <label>Roteiro de Narração (Português)</label>
                    <div class="copy-badge" onclick="copy('roteiro')">COPIAR TUDO</div>
                </div>
                <pre id="roteiro"></pre>
            </div>

            <div id="cenas-list"></div>
        </div>
    </div>

    <script>
        let currentNiche = 'Bíblico';
        function setNiche(n, el) {
            currentNiche = n;
            document.querySelectorAll('.niche-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
        }

        async function forjar() {
            const tema = document.getElementById('tema').value;
            const detalhes = document.getElementById('detalhes').value;
            const numCenas = document.getElementById('cenas').value;
            const duracao = document.getElementById('duracao').value;
            const apiKey = document.getElementById('apiKey').value;

            if(!tema) return alert("Por favor, insira um tema!");

            document.getElementById('results').style.display = 'none';
            document.getElementById('loader').style.display = 'block';

            const systemPrompt = \`Atua como um Roteirista e Diretor de Arte Especialista em YouTube Shorts de alta retenção.
Cria um roteiro viral para o nicho \${currentNiche}.
TEMA: \${tema}
DETALHES: \${detalhes}

REQUISITOS:
1. TITULO: Curto e extremamente chamativo.
2. ROTEIRO: Narração em Português para \${duracao} segundos. Comece com um HOOK (gancho) irresistível nos primeiros 2 segundos.
3. CENAS: Gere exatamente \${numCenas} descrições visuais (PROMPTS) em INGLÊS.
Cada prompt deve ser ultra-cinematográfico: "Hyper-realistic, 8k, cinematic lighting, dramatic shadows, wide angle, highly detailed, photorealistic, masterpiece".

FORMATO DE RESPOSTA (JSON APENAS):
{
  "titulo": "...",
  "roteiro": "...",
  "cenas": [{"prompt": "..."}]
}\`;

            try {
                const response = await fetch(\`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=\${apiKey}\`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: systemPrompt }] }]
                    })
                });

                const data = await response.json();
                let text = data.candidates[0].content.parts[0].text;
                text = text.replace(/\\`\\`\\`json|\\`\\`\\`/g, "").trim();
                const ai = JSON.parse(text);
                exibir(ai);
            } catch (e) {
                console.error(e);
                alert("Erro na geração. Verifique a chave API ou tente novamente.");
                document.getElementById('loader').style.display = 'none';
            }
        }

        function exibir(ai) {
            document.getElementById('titulo').innerText = ai.titulo;
            document.getElementById('roteiro').innerText = ai.roteiro;

            let html = "";
            ai.cenas.forEach((c, i) => {
                html += \`
                <div class="card">
                    <div class="card-header">
                        <label>CENA \${i+1} - VISUAL PROMPT (ENGLISH)</label>
                        <div class="copy-badge" onclick="copy('c-\${i}')">COPIAR PROMPT</div>
                    </div>
                    <pre id="c-\${i}">\${c.prompt}</pre>
                </div>\`;
            });

            document.getElementById('cenas-list').innerHTML = html;
            document.getElementById('loader').style.display = 'none';
            document.getElementById('results').style.display = 'block';
        }

        function copy(id) {
            const text = document.getElementById(id).innerText;
            navigator.clipboard.writeText(text);
            const n = document.getElementById('notif');
            n.style.display = 'block';
            setTimeout(() => n.style.display = 'none', 2000);
        }
    </script>
</body>
</html>
