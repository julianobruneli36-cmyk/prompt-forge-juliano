<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROMPT FORGE JULIANO - AI REAL V4</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ffd700;
            --bg: #000000;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 215, 0, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: white;
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 10px;
        }

        .niche-selector {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .niche-btn {
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .niche-btn:hover { border-color: var(--primary); }
        .niche-btn.active { background: var(--primary); color: black; font-weight: bold; }

        .input-box {
            background: rgba(255,255,255,0.02);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid #222;
            margin-bottom: 30px;
        }

        .row {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .field { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 0.7rem; color: var(--primary); font-weight: bold; text-transform: uppercase; }

        input, textarea {
            background: #111;
            border: 1px solid #333;
            padding: 15px;
            border-radius: 10px;
            color: white;
            font-size: 1rem;
            width: 100%;
        }

        textarea { height: 80px; resize: none; }

        .generate-btn {
            width: 100%;
            padding: 20px;
            background: var(--primary);
            border: none;
            border-radius: 15px;
            font-weight: 900;
            font-size: 1.2rem;
            cursor: pointer;
            text-transform: uppercase;
        }

        .loader {
            display: none;
            text-align: center;
            padding: 40px;
        }

        .results {
            display: none;
            margin-top: 40px;
        }

        .result-card {
            background: #0a0a0a;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 25px;
            border-left: 5px solid var(--primary);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .copy-btn {
            background: var(--primary);
            color: black;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: bold;
            cursor: pointer;
        }

        pre {
            white-space: pre-wrap;
            font-size: 0.95rem;
            line-height: 1.6;
            color: #ccc;
        }

        .notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--primary);
            color: black;
            padding: 15px 25px;
            border-radius: 10px;
            font-weight: bold;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Prompt Forge Juliano</h1>
        <p style="color: #666; font-size: 0.8rem; letter-spacing: 2px;">O SEU ASSISTENTE AI PARA ROTEIROS VIRAIS</p>
    </header>

    <div class="niche-selector">
        <div class="niche-btn active" onclick="setNiche('biblico', this)">📜 BÍBLICO</div>
        <div class="niche-btn" onclick="setNiche('luxo', this)">💎 LUXO</div>
        <div class="niche-btn" onclick="setNiche('viral', this)">🔥 VIRAL 8s</div>
    </div>

    <div class="input-box">
        <div class="row">
            <div class="field">
                <label>Tema ou Ideia</label>
                <input type="text" id="tema" placeholder="Ex: O segredo de Elias">
            </div>
            <div class="field">
                <label>Cenas</label>
                <input type="number" id="cenas" value="10">
            </div>
            <div class="field">
                <label>Segundos</label>
                <input type="number" id="duracao" value="60">
            </div>
        </div>
        <div class="field">
            <label>Detalhes Adicionais (Opcional)</label>
            <textarea id="detalhes" placeholder="Ex: Focar na parte do fogo descendo do céu..."></textarea>
        </div>
        <div class="field" style="margin-top: 15px;">
            <label>Gemini API Key (Para roteiros 100% únicos)</label>
            <input type="password" id="apiKey" placeholder="Cola aqui a tua chave do Gemini">
        </div>
        <button class="generate-btn" style="margin-top: 20px;" onclick="gerar()">FORJAR ROTEIRO COM AI</button>
    </div>

    <div id="loader" class="loader">
        <p style="color: var(--primary); font-weight: bold;">IA PROCESSANDO NARRATIVA DE ALTA RETENÇÃO...</p>
    </div>

    <div id="results" class="results">
        <div class="result-card">
            <div class="card-header">
                <label>Título Magnético (AI Generated)</label>
                <div class="copy-btn" onclick="copy('titulo')">COPIAR</div>
            </div>
            <pre id="titulo" style="font-weight: 900; color: var(--primary); font-size: 1.2rem;"></pre>
        </div>

        <div class="result-card">
            <div class="card-header">
                <label>Roteiro Completo (AI Generated)</label>
                <div class="copy-btn" onclick="copy('roteiro')">COPIAR TUDO</div>
            </div>
            <pre id="roteiro"></pre>
        </div>

        <div id="cenas-container"></div>
    </div>
</div>

<div id="notif" class="notification">Copiado!</div>

<script>
    let currentNiche = 'biblico';

    function setNiche(n, el) {
        currentNiche = n;
        document.querySelectorAll('.niche-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
    }

    async function gerar() {
        const tema = document.getElementById('tema').value;
        const detalhes = document.getElementById('detalhes').value;
        const numCenas = parseInt(document.getElementById('cenas').value);
        const duracao = parseInt(document.getElementById('duracao').value);
        const apiKey = document.getElementById('apiKey').value;

        if(!tema) { alert("Escreve um tema primeiro!"); return; }

        document.getElementById('results').style.display = 'none';
        document.getElementById('loader').style.display = 'block';

        if(apiKey) {
            // USAR AI REAL (GEMINI)
            try {
                const prompt = `Atua como um roteirista especialista em YouTube Shorts de alta retenção. 
                Nicho: ${currentNiche}. Tema: ${tema}. Detalhes: ${detalhes}. 
                Gera: 
                1. Um título viral curto e impactante.
                2. Um roteiro de narração completo e envolvente para ${duracao} segundos.
                3. ${numCenas} prompts cinematográficos detalhados (em inglês) para geração de imagem, um para cada cena.
                Responde apenas em formato JSON: {"titulo": "...", "roteiro": "...", "cenas": [{"prompt": "..."}]}`;

                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });

                const data = await response.json();
                const aiResponse = JSON.parse(data.candidates[0].content.parts[0].text);

                exibirResultados(aiResponse.titulo, aiResponse.roteiro, aiResponse.cenas, numCenas, duracao);
            } catch (e) {
                alert("Erro com a chave API ou limite atingido. Vou usar a base padrão.");
                gerarBasePadrao(tema, detalhes, numCenas, duracao);
            }
        } else {
            gerarBasePadrao(tema, detalhes, numCenas, duracao);
        }
    }

    function exibirResultados(titulo, roteiro, cenasAI, numCenas, duracao) {
        document.getElementById('titulo').innerText = titulo;
        document.getElementById('roteiro').innerText = roteiro;

        let cenasHTML = "";
        const tempoCena = (duracao / numCenas).toFixed(1);
        
        for(let i=0; i<numCenas; i++) {
            const start = (i*tempoCena).toFixed(1);
            const end = ((i+1)*tempoCena).toFixed(1);
            const prompt = cenasAI[i] ? cenasAI[i].prompt : "Cinematic scene, detailed 8k";
            cenasHTML += `
                <div class="result-card">
                    <div class="card-header">
                        <label>CENA ${i+1} [${start}-${end}s]</label>
                        <div class="copy-btn" onclick="copy('cena-${i}')">COPIAR</div>
                    </div>
                    <pre id="cena-${i}">${prompt}</pre>
                </div>
            `;
        }
        document.getElementById('cenas-container').innerHTML = cenasHTML;
        document.getElementById('loader').style.display = 'none';
        document.getElementById('results').style.display = 'block';
    }

    function gerarBasePadrao(tema, detalhes, numCenas, duracao) {
        // Lógica de fallback (a mesma da V3)
        const titulo = `O MISTÉRIO DE ${tema.toUpperCase()}`;
        const roteiro = `Prepare-se para descobrir a verdade sobre ${tema}. ${detalhes} ... (Usando base padrão)`;
        const cenas = Array(numCenas).fill({prompt: `${tema} cinematic scene, 8k`});
        exibirResultados(titulo, roteiro, cenas, numCenas, duracao);
    }

    function copy(id) {
        const t = document.getElementById(id).innerText;
        navigator.clipboard.writeText(t);
        const n = document.getElementById('notif');
        n.style.display = 'block';
        setTimeout(() => n.style.display = 'none', 2000);
    }
</script>
</body>
</html>
