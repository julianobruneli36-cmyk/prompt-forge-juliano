<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROMPT FORGE JULIANO PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #ffc107;
            --primary-hover: #ffca28;
            --bg: #0a0a0a;
            --card-bg: #141414;
            --text: #ffffff;
            --gray: #a0a0a0;
            --border: #2a2a2a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--text);
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 800px;
            width: 100%;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeInDown 0.8s ease;
        }

        h1 {
            font-weight: 900;
            font-size: 2.5rem;
            color: var(--primary);
            letter-spacing: 2px;
            text-shadow: 0 0 20px rgba(255,193,7,0.3);
            margin-bottom: 5px;
        }

        .subtitle {
            color: var(--gray);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 4px;
        }

        .niche-selector {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 30px;
        }

        .niche-btn {
            background: #1a1a1a;
            border: 1px solid var(--border);
            color: var(--text);
            padding: 12px 25px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
        }

        .niche-btn:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
        }

        .niche-btn.active {
            background: var(--primary);
            color: #000;
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(255,193,7,0.4);
        }

        .main-card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 24px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .main-card.active {
            display: block;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .full-width {
            grid-column: span 2;
        }

        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            color: var(--gray);
            font-size: 0.7rem;
            font-weight: 900;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input, select, textarea {
            width: 100%;
            background: #000;
            border: 1px solid var(--border);
            color: #fff;
            padding: 12px 15px;
            border-radius: 12px;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(255,193,7,0.1);
        }

        .actions {
            margin-top: 30px;
            display: flex;
            gap: 10px;
        }

        .btn-generate {
            width: 100%;
            background: var(--primary);
            color: #000;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-weight: 900;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
            margin-top: 20px;
        }

        .btn-generate:hover {
            background: var(--primary-hover);
            transform: scale(1.02);
        }

        .output-section {
            margin-top: 30px;
            background: #000;
            border-radius: 15px;
            padding: 20px;
            border: 1px dashed var(--border);
            position: relative;
        }

        #result-text {
            font-size: 0.95rem;
            line-height: 1.6;
            color: #ddd;
            min-height: 60px;
            margin-bottom: 15px;
            word-break: break-word;
        }

        .copy-btn {
            background: #222;
            border: 1px solid var(--border);
            color: var(--primary);
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
        }

        .copy-btn:hover {
            background: #2a2a2a;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 600px) {
            .form-grid { grid-template-columns: 1fr; }
            .full-width { grid-column: span 1; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>PROMPT FORGE</h1>
        <div class="subtitle">Juliano Bruneli Pro</div>
    </header>

    <div class="niche-selector">
        <button class="niche-btn active" onclick="switchNiche('biblico')">
            <i class="fas fa-cross"></i> Bíblico
        </button>
        <button class="niche-btn" onclick="switchNiche('luxo')">
            <i class="fas fa-building"></i> Luxo
        </button>
    </div>

    <!-- Biblical Section -->
    <div id="card-biblico" class="main-card active">
        <div class="form-grid">
            <div class="input-group full-width">
                <label>Personagem ou Cena</label>
                <input type="text" id="bib-subject" placeholder="Ex: Profeta Elias subindo aos céus em carruagem de fogo">
            </div>
            <div class="input-group">
                <label>Estilo Visual</label>
                <select id="bib-style">
                    <option value="Cinematic, hyper-realistic, 8k">Cinematográfico</option>
                    <option value="Pixar 3D animation style, cute character design">Estilo Pixar 3D</option>
                    <option value="Epic oil painting, dramatic brushstrokes, classical">Pintura a Óleo Épica</option>
                    <option value="Vibrant comic book art, detailed line work">Arte de HQ</option>
                </select>
            </div>
            <div class="input-group">
                <label>Iluminação</label>
                <select id="bib-light">
                    <option value="Divine light beams, heavenly glow">Luz Divina</option>
                    <option value="Golden hour, warm atmospheric lighting">Hora Dourada</option>
                    <option value="Dramatic chiaroscuro, high contrast">Dramática (Luz e Sombra)</option>
                    <option value="Soft sunset, pastel colors">Pôr do Sol Suave</option>
                </select>
            </div>
            <div class="input-group">
                <label>Ângulo de Câmera</label>
                <select id="bib-camera">
                    <option value="Low angle shot, looking up, heroic scale">Ângulo Baixo (Heroico)</option>
                    <option value="Wide shot, epic landscape">Plano Aberto (Cenário)</option>
                    <option value="Close-up, detailed facial expression">Close-up (Expressão)</option>
                </select>
            </div>
            <div class="input-group">
                <label>Proporção</label>
                <select id="bib-ratio">
                    <option value="--ar 16:9">Horizontal (16:9)</option>
                    <option value="--ar 9:16">Vertical (9:16)</option>
                    <option value="--ar 1:1">Quadrado (1:1)</option>
                </select>
            </div>
        </div>
        <button class="btn-generate" onclick="generatePrompt('biblico')">GERAR PROMPT BÍBLICO</button>
    </div>

    <!-- Luxury Section -->
    <div id="card-luxo" class="main-card">
        <div class="form-grid">
            <div class="input-group full-width">
                <label>Imóvel / Detalhe</label>
                <input type="text" id="lux-subject" placeholder="Ex: Mansão ultra-moderna à beira-mar com piscina infinita">
            </div>
            <div class="input-group">
                <label>Ambiente</label>
                <select id="lux-env">
                    <option value="Exterior drone shot, architectural photography">Exterior (Drone)</option>
                    <option value="Interior living room, minimalist decor, open concept">Interior (Sala/Lounge)</option>
                    <option value="Master bedroom, luxury textiles, panoramic window">Quarto Master</option>
                    <option value="Backyard, infinity pool, fire pit, sunset">Área Gourmet/Piscina</option>
                </select>
            </div>
            <div class="input-group">
                <label>Estilo de Design</label>
                <select id="lux-style">
                    <option value="Ultra-modern, glass and steel, organic curves">Ultra-Moderno</option>
                    <option value="Minimalist scandinavian luxury, clean lines">Minimalista de Luxo</option>
                    <option value="Classic European mansion, marble and gold">Mansão Clássica</option>
                    <option value="Tropical modernism, lush vegetation integration">Modernismo Tropical</option>
                </select>
            </div>
            <div class="input-group">
                <label>Momento do Dia</label>
                <select id="lux-time">
                    <option value="Blue hour, glowing interior lights, twilight">Blue Hour (Luzes Acessas)</option>
                    <option value="Bright daylight, sharp shadows, clear sky">Dia Ensolarado</option>
                    <option value="Golden hour, soft warm reflection on glass">Golden Hour</option>
                </select>
            </div>
            <div class="input-group">
                <label>Proporção</label>
                <select id="lux-ratio">
                    <option value="--ar 16:9">Horizontal (16:9)</option>
                    <option value="--ar 9:16">Vertical (9:16)</option>
                </select>
            </div>
        </div>
        <button class="btn-generate" onclick="generatePrompt('luxo')">GERAR PROMPT DE LUXO</button>
    </div>

    <!-- Output -->
    <div id="output-container" class="output-section" style="display: none;">
        <div id="result-text"></div>
        <button class="copy-btn" onclick="copyPrompt()">
            <i class="far fa-copy"></i> COPIAR PROMPT
        </button>
    </div>
</div>

<script>
    function switchNiche(niche) {
        document.querySelectorAll(\'.niche-btn\').forEach(btn => btn.classList.remove(\'active\'));
        document.querySelectorAll(\'.main-card\').forEach(card => card.classList.remove(\'active\'));
        
        if(niche === \'biblico\') {
            document.querySelector(\'.niche-btn:nth-child(1)\').classList.add(\'active\');
            document.getElementById(\'card-biblico\').classList.add(\'active\');
        } else {
            document.querySelector(\'.niche-btn:nth-child(2)\').classList.add(\'active\');
            document.getElementById(\'card-luxo\').classList.add(\'active\');
        }
        document.getElementById(\'output-container\').style.display = \'none\';
    }

    function generatePrompt(niche) {
        let prompt = "";
        
        if(niche === \'biblico\') {
            const subject = document.getElementById(\'bib-subject\').value || "Biblical scene";
            const style = document.getElementById(\'bib-style\').value;
            const light = document.getElementById(\'bib-light\').value;
            const camera = document.getElementById(\'bib-camera\').value;
            const ratio = document.getElementById(\'bib-ratio\').value;
            
            prompt = `Cinematic scene of ${subject}, ${style}, ${light}, ${camera}, intricate details, masterpiece, high quality, 8k --v 6.0 ${ratio}`;
        } else {
            const subject = document.getElementById(\'lux-subject\').value || "Luxury mansion";
            const env = document.getElementById(\'lux-env\').value;
            const style = document.getElementById(\'lux-style\').value;
            const time = document.getElementById(\'lux-time\').value;
            const ratio = document.getElementById(\'lux-ratio\').value;
            
            prompt = `Professional architectural photography of ${subject}, ${env}, ${style}, ${time}, ultra-realistic, high-end real estate showcase, 8k, sharp focus, magazine quality ${ratio}`;
        }

        const outContainer = document.getElementById(\'output-container\');
        const outText = document.getElementById(\'result-text\');
        
        outText.innerText = prompt;
        outContainer.style.display = \'block\';
        outContainer.scrollIntoView({ behavior: \'smooth\' });
    }

    function copyPrompt() {
        const text = document.getElementById(\'result-text\').innerText;
        navigator.clipboard.writeText(text).then(() => {
            const btn = document.querySelector(\'.copy-btn\');
            btn.innerHTML = \'<i class="fas fa-check"></i> COPIADO!\';
            btn.style.color = \'#4caf50\';
            setTimeout(() => {
                btn.innerHTML = \'<i class="far fa-copy"></i> COPIAR PROMPT\';
                btn.style.color = \'var(--primary)\';
            }, 2000);
        });
    }
</script>

</body>
</html>
